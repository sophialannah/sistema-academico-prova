<div class="curso-list-container">
  <h2>Cursos</h2>

  <button mat-raised-button color="primary" routerLink="/cursos/novo">
    <mat-icon>add</mat-icon> Novo Curso
  </button>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

    <ng-container matColumnDef="idCurso">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let curso">{{ curso.idCurso }}</td>
    </ng-container>

    <ng-container matColumnDef="nomeCurso">
      <th mat-header-cell *matHeaderCellDef>Nome do Curso</th>
      <td mat-cell *matCellDef="let curso">{{ curso.nomeCurso }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let curso">
        <button mat-icon-button color="primary" [routerLink]="['/cursos/editar', curso.idCurso]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="excluir(curso.idCurso)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>
</div>
